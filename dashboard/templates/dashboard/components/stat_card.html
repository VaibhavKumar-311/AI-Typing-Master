<div class="glass p-6 rounded-xl shadow-lg transform hover:-translate-y-1 hover:shadow-2xl transition duration-300 relative overflow-hidden group">
    <!-- Background Gradient Glow on Hover -->
    <div class="absolute inset-0 bg-gradient-to-r {{ gradient|default:'from-blue-600/20 to-purple-600/20' }} opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none"></div>
    
    <div class="relative z-10 flex items-center justify-between">
        <h3 class="text-gray-400 text-sm font-semibold uppercase tracking-wider">{{ title }}</h3>
        {% if icon %}
            <div class="text-xl {{ icon_color|default:'text-blue-400' }}">{{ icon }}</div>
        {% endif %}
    </div>
    
    <div class="relative z-10 mt-4 flex flex-col">
        <span class="text-4xl font-extrabold text-white tracking-tight">{{ value }}</span>
        {% if subtitle %}
            <span class="text-gray-400 text-sm mt-1 font-medium">{{ subtitle }}</span>
        {% endif %}
    </div>
</div>

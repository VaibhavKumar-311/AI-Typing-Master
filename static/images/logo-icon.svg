<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <g transform="translate(5, 5)">
    <!-- Background Hexagon/Diamond outline -->
    <polygon points="20,0 40,10 40,30 20,40 0,30 0,10" fill="none" stroke="url(#neonGlow)" stroke-width="2.5" filter="url(#glow)" opacity="0.8"/>
    
    <!-- Caret text > -->
    <text x="10" y="27" font-family="'Courier New', monospace" font-size="22" font-weight="900" fill="#fff" filter="url(#glow)">&gt;</text>
    <!-- Underscore _ -->
    <rect x="22" y="25" width="10" height="4" fill="#22d3ee" filter="url(#glow)"/>
  </g>
</svg>

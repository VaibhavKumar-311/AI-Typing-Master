<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 50" width="250" height="50">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon: Caret >_ -->
  <g transform="translate(5, 5)">
    <!-- Background Hexagon/Diamond outline -->
    <polygon points="20,0 40,10 40,30 20,40 0,30 0,10" fill="none" stroke="url(#neonGlow)" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
    
    <!-- Caret text > -->
    <text x="10" y="26" font-family="'Courier New', monospace" font-size="20" font-weight="900" fill="#fff" filter="url(#glow)">&gt;</text>
    <!-- Underscore _ -->
    <rect x="22" y="24" width="10" height="3" fill="#22d3ee" filter="url(#glow)"/>
  </g>
  
  <!-- Text -->
  <text x="55" y="32" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="url(#neonGlow)" letter-spacing="1">
    <tspan fill="#ffffff">AI </tspan>TYPING<tspan fill="#64748b" font-size="22">MASTER</tspan>
  </text>
</svg>

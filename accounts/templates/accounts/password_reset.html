{% extends "base.html" %}
{% block title %}Reset Password | Typing Master{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="glass p-8 rounded-xl shadow-2xl">
        <h2 class="text-2xl font-bold text-center text-white mb-6">Reset Password</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form }}
            <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md mt-6" type="submit">
                Request Password Reset
            </button>
        </form>
    </div>
</div>
{% endblock %}

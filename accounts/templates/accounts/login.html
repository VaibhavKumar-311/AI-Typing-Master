{% extends "base.html" %}

{% block title %}Login | Typing Master{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="glass p-8 rounded-xl shadow-2xl">
        <h2 class="text-3xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-6">Welcome Back</h2>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-4">
                    <label class="block text-gray-300 text-sm font-bold mb-2" for="{{ field.id_for_label }}">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}" id="{{ field.id_for_label }}" class="w-full px-4 py-2 mt-2 bg-slate-800 border border-slate-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                    {% if field.errors %}
                        <p class="text-red-500 text-xs italic mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            <div class="flex items-center justify-between mt-6">
                <button class="w-full bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-bold py-2 px-4 rounded-md focus:outline-none focus:shadow-outline transition duration-150 ease-in-out" type="submit">
                    Sign In
                </button>
            </div>
        </form>
        <div class="text-center mt-4">
            <a href="{% url 'password_reset' %}" class="inline-block align-baseline font-bold text-sm text-blue-400 hover:text-blue-500">
                Forgot Password?
            </a>
        </div>
        <p class="text-center text-gray-400 text-sm mt-6">
            Don't have an account? <a href="{% url 'register' %}" class="text-blue-400 hover:text-blue-500">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}

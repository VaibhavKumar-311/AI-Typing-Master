{% extends "base.html" %}

{% block title %}Register | Typing Master{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="glass p-8 rounded-xl shadow-2xl">
        <h2 class="text-3xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500 mb-6">Create Account</h2>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-4">
                    <label class="block text-gray-300 text-sm font-bold mb-2" for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-500 text-xs italic mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            <div class="flex items-center justify-between mt-6">
                <button class="w-full bg-gradient-to-r from-green-500 to-blue-600 hover:from-green-600 hover:to-blue-700 text-white font-bold py-2 px-4 rounded-md focus:outline-none focus:shadow-outline transition duration-150 ease-in-out" type="submit">
                    Sign Up
                </button>
            </div>
        </form>
        <p class="text-center text-gray-400 text-sm mt-6">
            Already have an account? <a href="{% url 'login' %}" class="text-blue-400 hover:text-blue-500">Log In</a>
        </p>
    </div>
</div>
{% endblock %}
